<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
    
  <div class="profile-info">
    <img src="avatar-jessica.jpeg" alt="profile image">
  <div style="width: 100%;display: flex;flex-direction: column;gap:5px;align-items: center;">
     <h2 style="color:hsl(0, 0%, 100%)"> Jessica Randall</h2>
    <p style="color:hsl(75, 94%, 57%);font-size: 14px;"> London, United Kingdom</p>
  </div>
    <p style="color:hsl(0, 0%, 100%);font-size: 14px;"> "Front-end developer and avid reader."</p>

  </div>
  <div class="socials">
    <div class="social-btn"> GitHub</div>
    <div class="social-btn"> Frontend Mentor</div>
    <div class="social-btn">LinkedIn</div>
    <div class="social-btn">Twitter</div>
    <div class="social-btn"> Instagram</div>
  </div>
  
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://batong-gevaise.onrender.com">Batong Gevaise</a>.
  </footer>
</body>
</html>
